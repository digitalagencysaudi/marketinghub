<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketingHub Blog</title>
<meta name="description" content="MarketingHub blog article">
<link rel="canonical" href="">
<meta property="og:type" content="article">
<meta property="og:title" content="MarketingHub Blog">
<meta property="og:description" content="MarketingHub article">
<meta property="og:image" content="">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
body{font-family:Inter,sans-serif;background:#050505;color:#fff}
.progress{position:fixed;top:0;left:0;height:4px;background:#22c55e;width:0;z-index:9999}
.article-content img{max-width:100%;border-radius:16px;margin:20px 0}
.article-content h2{font-size:2rem;margin:20px 0;color:#22c55e}
.article-content p{margin:12px 0;line-height:1.8}
</style>
</head>
<body>
<div id="progress" class="progress"></div>

<header class="max-w-6xl mx-auto p-6">
<a href="index.html" class="text-green-500 font-bold">← Back to Blogs</a>
</header>

<section class="max-w-5xl mx-auto px-6 py-10">
<h1 id="title" class="text-5xl font-black mb-4">Loading...</h1>
<p id="date" class="text-gray-400 mb-6"></p>
<p id="readingTime" class="text-green-400 mb-8"></p>
<img id="featuredImage" class="w-full rounded-3xl hidden" loading="lazy">
</section>

<main class="max-w-4xl mx-auto px-6 pb-20">
<div id="content" class="article-content">Loading article...</div>

<div class="mt-10 flex gap-4">
<button id="copyBtn" class="bg-green-500 text-black px-4 py-2 rounded">Copy Link</button>
<a href="index.html" class="border border-green-500 px-4 py-2 rounded">All Blogs</a>
</div>
</main>

<script>
const firebaseConfig = {
 apiKey:"YOUR_API_KEY",
 authDomain:"YOUR_DOMAIN",
 databaseURL:"YOUR_DB_URL",
 projectId:"YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function stripHtml(html){
 const div=document.createElement('div');
 div.innerHTML=html;
 return div.textContent||div.innerText||'';
}

const slug=new URLSearchParams(location.search).get("slug");

if(slug){
 db.ref("blogs").orderByChild("slug").equalTo(slug).once("value")
 .then(snapshot=>{
   const data=snapshot.val();
   if(!data){
      document.getElementById("content").innerHTML="<h2>Article Not Found</h2>";
      return;
   }

   const post=Object.values(data)[0];

   document.title=post.title+" | MarketingHub";
   document.getElementById("title").textContent=post.title||"Untitled";
   document.getElementById("date").textContent=post.date||"";

   if(post.image){
      const img=document.getElementById("featuredImage");
      img.src=post.image;
      img.classList.remove("hidden");
   }

   document.getElementById("content").innerHTML=post.content||"";

   const words=stripHtml(post.content||"").split(/\s+/).length;
   document.getElementById("readingTime").textContent=Math.ceil(words/200)+" min read";

   const desc=stripHtml(post.content||"").substring(0,160);
   document.querySelector('meta[name="description"]').setAttribute("content",desc);
 })
 .catch(err=>{
   document.getElementById("content").innerHTML="<h2>Error Loading Article</h2>";
   console.error(err);
 });
}

document.getElementById("copyBtn").addEventListener("click",()=>{
 navigator.clipboard.writeText(location.href);
 alert("Link copied");
});

window.addEventListener("scroll",()=>{
 const winScroll=document.documentElement.scrollTop;
 const height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
 const scrolled=(winScroll/height)*100;
 document.getElementById("progress").style.width=scrolled+"%";
});
</script>
</body>
</html>
