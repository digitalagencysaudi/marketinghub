<script>
const firebaseConfig = {
    apiKey:"AIzaSyAq3IgYIFu7l6N_mKNVcyfWKDp1akTauDs",
    authDomain:"iso-certification-guide.firebaseapp.com",
    databaseURL:"https://iso-certification-guide-default-rtdb.firebaseio.com",
    projectId:"iso-certification-guide",
    storageBucket:"iso-certification-guide.firebasestorage.app",
    messagingSenderId:"277771367161",
    appId:"1:277771367161:web:0f61aef15bb9ce0d64a828"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const queryParameter = urlParams.get('slug') || urlParams.get('id');

if (queryParameter) {
    // Optimized: Use orderByChild for direct lookup rather than downloading all blogs
    database.ref('blogs').orderByChild('slug').equalTo(queryParameter).once('value').then(snapshot => {
        const data = snapshot.val();
        
        if (data) {
            const key = Object.keys(data)[0];
            const post = data[key];

            document.getElementById('hero-title').innerText = post.title;
            document.title = post.title + " | ISO Certification Guide";
            document.getElementById('date').innerText = post.date;
            document.getElementById('content').innerHTML = post.content;
            
            const fImage = document.getElementById('featured-image');
            fImage.src = post.image;
            fImage.classList.remove('invisible');
            
            // Meta updates
            document.querySelector('meta[name="description"]')
                .setAttribute('content', post.content.replace(/<[^>]+>/g, '').substring(0, 150));
        } else {
            show404Error();
        }
    }).catch(err => show404Error());
} else {
    show404Error();
}

// Sidebar logic remains same as provided
</script>
