<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="YyJDwVkSVNOMCP-VrUmtS4LdXW80X78HNrhmNCN_fAU" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MarketingHub</title>

    <meta name="description" content="MarketingHub - Digital marketing insights, SEO strategies, PPC, and growth marketing blogs">
    <meta name="keywords" content="MarketingHub, Digital Marketing, SEO Blogs, PPC, Marketing Insights">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="MarketingHub">
    <meta property="og:description" content="MarketingHub - Digital marketing insights and strategies">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }

        @keyframes dynamicMesh {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,-30px) scale(1.1); }
        }

        .animate-mesh {
            animation: dynamicMesh 18s infinite ease-in-out;
        }
    </style>
</head>

<body class="bg-[#030612] text-white">

<!-- HERO -->
<section class="relative min-h-screen flex flex-col justify-center px-6">

    <header class="max-w-7xl mx-auto w-full flex justify-between py-6">
        <h1 class="text-xl font-black">
            Marketing<span class="text-cyan-400">Hub</span>
        </h1>
    </header>

    <div class="max-w-4xl mx-auto text-center">
        <h2 class="text-5xl font-black leading-tight">
            Grow Your Business with <span class="text-cyan-400">MarketingHub</span>
        </h2>

        <p class="mt-6 text-gray-400 text-lg">
            SEO, PPC, social media marketing and digital growth strategies in one place.
        </p>

        <div class="mt-8 flex gap-3 justify-center">
            <input type="text" placeholder="Search articles..."
                class="px-4 py-3 w-72 rounded-xl bg-white/5 border border-white/10">

            <button class="px-6 py-3 bg-cyan-500 text-black font-bold rounded-xl">
                Search
            </button>
        </div>
    </div>
</section>

<!-- BLOG SECTION -->
<section class="max-w-7xl mx-auto px-6 py-20">

    <h3 class="text-3xl font-bold mb-10">Latest Blogs</h3>

    <div id="posts-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <!-- Pagination -->
    <div class="flex justify-center items-center gap-4 mt-10">
        <button id="prevPage" class="px-4 py-2 bg-gray-800 rounded">Prev</button>
        <span id="pageInfo"></span>
        <button id="nextPage" class="px-4 py-2 bg-gray-800 rounded">Next</button>
    </div>
</section>

<script>
/* =========================
   FIREBASE CONFIG (MARKETINGHUB)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyCdI8gnXTw7bAuB7ssCA044qf12neionYk",
  authDomain: "marketinghub-4eb62.firebaseapp.com",
  projectId: "marketinghub-4eb62",
  storageBucket: "marketinghub-4eb62.firebasestorage.app",
  messagingSenderId: "431361025139",
  appId: "1:431361025139:web:bf495f269b30228a407606",
  measurementId: "G-5LN2F8C2VL"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

/* =========================
   VARIABLES
========================= */
let allPosts = [];
let currentPage = 1;
const postsPerPage = 6;

/* =========================
   FETCH BLOGS
========================= */
database.ref('blogs').on('value', (snapshot) => {
    const data = snapshot.val();
    const container = document.getElementById('posts-container');
    container.innerHTML = '';

    if (!data) {
        container.innerHTML = "<p>No blogs found.</p>";
        return;
    }

    allPosts = Object.keys(data).map(key => ({
        id: key,
        ...data[key]
    }));

    renderPosts(allPosts);
});

/* =========================
   RENDER POSTS
========================= */
function renderPosts(posts) {
    const container = document.getElementById('posts-container');
    container.innerHTML = '';

    const start = (currentPage - 1) * postsPerPage;
    const end = start + postsPerPage;

    const pagePosts = posts.slice(start, end);

    pagePosts.forEach(post => {
        const slug = post.slug || post.id;

        container.innerHTML += `
        <div class="bg-white/5 border border-white/10 rounded-xl overflow-hidden">
            <img src="${post.image}" class="h-48 w-full object-cover">

            <div class="p-4">
                <h4 class="font-bold text-lg">${post.title}</h4>
                <p class="text-gray-400 text-sm mt-2">
                    ${(post.content || '').replace(/<[^>]+>/g,'').substring(0,100)}...
                </p>

                <a href="blog.html?slug=${slug}" 
                   class="inline-block mt-4 text-cyan-400 font-semibold">
                   Read More →
                </a>
            </div>
        </div>`;
    });

    updatePagination(posts);
}

/* =========================
   PAGINATION
========================= */
function updatePagination(posts) {
    const totalPages = Math.ceil(posts.length / postsPerPage);

    document.getElementById('pageInfo').innerText =
        `Page ${currentPage} of ${totalPages}`;

    document.getElementById('prevPage').disabled = currentPage === 1;
    document.getElementById('nextPage').disabled = currentPage === totalPages;
}

/* =========================
   SEARCH
========================= */
document.querySelector('input').addEventListener('input', function () {
    const value = this.value.toLowerCase();

    const filtered = allPosts.filter(p =>
        (p.title || '').toLowerCase().includes(value)
    );

    currentPage = 1;
    renderPosts(filtered);
});

/* =========================
   PAGINATION BUTTONS
========================= */
document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) {
        currentPage--;
        renderPosts(allPosts);
    }
});

document.getElementById('nextPage').addEventListener('click', () => {
    const totalPages = Math.ceil(allPosts.length / postsPerPage);

    if (currentPage < totalPages) {
        currentPage++;
        renderPosts(allPosts);
    }
});
</script>

</body>
</html>
